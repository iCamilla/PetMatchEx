<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Match </title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link href="css/bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
</head>

<body class="body">
    <div class="container MainContainer">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">PET MATCH</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                        <a class="nav-link" href="#">Adotar</a>
                        <a class="nav-link" href="#">Perdidos</a>
                        <a class="nav-link" href="#">Sobre Nós</a>
                        <a class="nav-link" href="#">Contatos</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-12">
                    <div id="banner" class="carousel slide">
                        <div class="carousel-indicators">
                            <button type="button" data-bs-target="#banner" data-bs-slide-to="0" class="active"
                                aria-current="true" aria-label="Slide 1"></button>
                            <button type="button" data-bs-target="#banner" data-bs-slide-to="1"
                                aria-label="Slide 2"></button>
                            <button type="button" data-bs-target="#banner" data-bs-slide-to="2"
                                aria-label="Slide 3"></button>
                        </div>
                        <div class="carousel-inner">
                            <div class="carousel-item active">
                                <img src="images/banner1.jpg" class="d-block w-100" alt="pet 1">
                            </div>
                            <div class="carousel-item">
                                <img src="images/banner2.jpg" class="d-block w-100" alt="pet 2">
                            </div>
                            <div class="carousel-item">
                                <img src="images/banner3.jpg" class="d-block w-100" alt="pet 3">
                            </div>
                        </div>
                        <button class="carousel-control-prev" type="button" data-bs-target="#banner"
                            data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Previous</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#banner"
                            data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Next</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>
        <br><br>
        <div class="text-center">
            <h2 id="inspiration">Últimos Adicionados</h2>
            <br>
        </div>
        <div class="card-group justify-content-center" id="RecentlyAdded">
            <div class="row g-2">

                <div class="col">
                    <div class="card">
                        <div class="card-body">
                            <img src="images/Peter.png" alt="">
                            <hr>
                            <h5 class="card-title">Peter 😸</h5>
                            <button type="button" class="btn btn-outline-dark">Verificar</button><br><br>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card">
                        <div class="card-body">
                            <img src="images/Max.png" alt="">
                            <hr>
                            <h5 class="card-title">Max 🐶</h5>
                            <button type="button" class="btn btn-outline-dark">Verificar</button><br><br>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card">
                        <div class="card-body">
                            <img src="images/Gabi.png" alt="">
                            <hr>
                            <h5 class="card-title">Gabi 🐈</h5>
                            <button type="button" class="btn btn-outline-dark"
                                id="birdApiBtn">Verificar</button><br><br>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <br>
        <hr>
        <footer class="text-center mt-4 mb-4 text-muted">

            <p>Copyright &copy; 2026. All rights reserved.</p>
        </footer>
    </div>


</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
